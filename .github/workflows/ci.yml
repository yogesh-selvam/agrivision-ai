# GitHub Actions CI/CD Pipeline for AGRIBOT
name: Agribot Continuous Integration / Deployment

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-test-build:
    name: Lint, Test, & Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sourced Code
      uses: actions/checkout@v4

    - name: Setup Node Actions Runtime
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Platform Dependencies
      run: npm install

    - name: Execute Type Check
      run: npm run lint

    - name: Run Build Test Compilation
      run: npm run build

  build-docker-container:
    name: Dockerize Container Verification
    runs-on: ubuntu-latest
    needs: lint-test-build

    steps:
    - name: Checkout Sourced Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Load Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: agribot/core:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
